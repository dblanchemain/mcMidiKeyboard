<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"/>
  <title>mcMidiKeyboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header>
    <span class="app-title">mcMidiKeyboard</span>
    <span id="statusBar" class="status">audio: démarrage…</span>
    <button id="btnAddRow">+ Ligne</button>
    <button id="btnSave">Sauvegarder</button>
    <button id="btnLoad">Charger JSON</button>
  </header>

  <div id="tableWrap">
    <table id="mappingTable">
      <thead>
        <tr>
          <th>Touche</th>
          <th>Fichier</th>
          <th>Gain</th>
          <th>Type fade</th>
          <th>Fade-in</th>
          <th>Fade-out</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- rows injectées par renderer.js -->
      </tbody>
    </table>
  </div>

  <!-- Modal fade-in/out (calqué sur objetParam.html de kandiskyscore) -->
  <div id="fadeModal" class="modal hidden">
    <div class="modal-box">
      <h3>Enveloppe fade-in / fade-out</h3>
      <div class="fade-type-row">
        <label>Type :</label>
        <select id="modalFadeType">
          <option value="q">Qt sinusoïde (q)</option>
          <option value="h">Demi-sinus. (h)</option>
          <option value="t">Linéaire (t)</option>
          <option value="l">Logarithmique (l)</option>
          <option value="p">Parab. invers. (p)</option>
        </select>
      </div>
      <div class="fade-num-row">
        <label>Fade-in (s)</label>
        <input id="modalFadeInVal"  type="number" min="0" max="60" step="0.01" value="0.2"/>
        <label>Fade-out (s)</label>
        <input id="modalFadeOutVal" type="number" min="0" max="60" step="0.01" value="0.2"/>
      </div>
      <!-- Visualiseur d'enveloppe -->
      <div id="envContainer">
        <div id="envHandleIn"  class="env-handle" data-handle="in"></div>
        <div id="envHandleOut" class="env-handle" data-handle="out"></div>
        <svg id="envSvg" width="300" height="90">
          <polyline id="envCurve" fill="none" stroke="#7aa2f7" stroke-width="2"/>
        </svg>
      </div>
      <div class="modal-buttons">
        <button id="modalCancel">Annuler</button>
        <button id="modalOk">OK</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
